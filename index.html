<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barra Pocket - App</title>
    <!-- Estilos y Librerías -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0D0D12;
            color: #F3F3F7;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        .glass-header {
            background: rgba(13, 13, 18, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
        }
        .cocktail-card {
            background: #161620;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cocktail-card:active {
            transform: scale(0.96);
            background: #1c1c2b;
        }
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.25s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const DATA = {
            alcohol: [
                { id: 1, name: "1796 Old Fashioned", ingredients: ["5 cl Ron Santa Teresa 1796", "2 cl Sirope simple", "1 dash Angostura naranja", "10 gotas Bitter chocolate"] },
                { id: 2, name: "Aperol Spritz", ingredients: ["9 cl Licor Aperol", "12.5 cl Prosecco Follador", "4 cl Soda"] },
                { id: 3, name: "Babilonia", ingredients: ["5 cl Cachaça Iracema", "1.5 cl Sirope pomelo", "1 cl Amaro Ramazzotti", "3 cl Puré maracuyá"] },
                { id: 4, name: "Banana Orange", ingredients: ["5 cl Licor plátano", "2 cl Puré plátano", "12 cl Zumo naranja", "2.5 cl Vodka Khor"] },
                { id: 5, name: "Bloody Mary", ingredients: ["5 cl Vodka Khor", "20 cl Zumo tomate", "1.5 cl Limón", "10 dashes Perrins", "2 Tabasco", "Pimienta y Sal de apio"] },
                { id: 6, name: "Blue Peach Lemonade", ingredients: ["6 cl Licor melocotón", "1.5 cl Blue Curaçao", "2.5 cl Zumo limón", "Top 7up"] },
                { id: 7, name: "Caipirinha", ingredients: ["6 cl Cachaça", "1/2 Lima cuñas", "4 cuch. Azúcar blanco", "Top Casera"] },
                { id: 8, name: "Caipiroska", ingredients: ["6 cl Vodka", "1/2 Lima cuñas", "3 cuch. Azúcar blanco", "Top Casera"] },
                { id: 9, name: "Chandon Garden Spritz", ingredients: ["20 cl Chandon Garden (Botella 70 cl)"] },
                { id: 10, name: "Coco Loco", ingredients: ["5 cl Licor coco", "2 cl Puré coco", "2.5 cl Triple Seco", "12 cl Zumo piña"] },
                { id: 11, name: "Cosmopolitan", ingredients: ["5 cl Vodka", "2.1 cl Triple Seco", "7 cl Zumo arándanos", "7 cl Zumo lima"] },
                { id: 12, name: "Daiquiri", ingredients: ["6 cl Ron Bacardi", "2 cl Lima", "2 cl Sirope simple"] },
                { id: 13, name: "Daiquiri Frozen Frutal", ingredients: ["6 cl Ron", "3 cl Puré fruta", "6 cl Sweet & Sour"] },
                { id: 14, name: "Daiquiri Pineapple", ingredients: ["6 cl Ron Havana Origen", "2 cl Lima", "2 cl Sirope simple", "3 cl Puré piña"] },
                { id: 15, name: "Diablo", ingredients: ["5 cl Tequila", "2 cl Cassís", "3 cl Lima", "Top Ginger Beer"] },
                { id: 16, name: "Double Apple", ingredients: ["5 cl Dewar's", "1.5 cl Puré manzana", "1.5 cl Limón", "1 cl Agave", "2 cuñas manzana", "10 gotas Foam"] },
                { id: 17, name: "Electric Lemonade", ingredients: ["5 cl Vodka", "2.5 cl Blue Curaçao", "5 cl Sweet & Sour", "Top 7up"] },
                { id: 18, name: "Espresso Martini", ingredients: ["Hasta 23:00: 1 Espresso fresco", "Tras 23:00: 3 cl Cold Brew", "3 cl Kahlúa", "5 cl Vodka", "2 cl Sirope simple"] },
                { id: 19, name: "Hugo Tropical", ingredients: ["5 cl St. Germain", "2.5 cl Puré Maracuyá", "20 cl Prosecco", "Top Soda"] },
                { id: 20, name: "La Paloma Patrón", ingredients: ["5 cl Patrón Silver", "2 cl Lima", "1 Soda Pomelo"] },
                { id: 21, name: "Mai Tai", ingredients: ["2.5 cl Bacardi Spice", "2.5 cl Bacardi Blanco", "2.5 cl Havana Origen", "2.5 cl Triple Seco", "2.5 cl Orgeat", "2.5 cl Lima"] },
                { id: 22, name: "Mango Mezcal", ingredients: ["5 cl Mezcal", "2.5 cl Italicus", "2 cl Sirope Mango Picante", "4 cl Zumo pomelo rojo", "2 cl Limón"] },
                { id: 23, name: "Margarita", ingredients: ["6 cl Tequila", "3.5 cl Triple Seco", "3.5 cl Lima", "1.5 cl Sirope simple"] },
                { id: 24, name: "Margarita Mango Spicy", ingredients: ["5 cl Tequila", "2 cl Beirão d'Honra", "2.5 cl Sirope Mango", "1.5 cl Puré Mango", "2 cl Lima", "1 cl Sirope Spicy"] },
                { id: 25, name: "Margarita Tamarindo", ingredients: ["5 cl Tequila", "2.5 cl Triple Seco", "2.5 cl Sweet & Sour", "3 cl Puré Tamarindo"] },
                { id: 26, name: "Martini Porn Star", ingredients: ["5 cl Absolut Vainilla", "2.5 cl Lima", "3 cl Maracuyá", "2.5 cl Passoa", "1 chupito Prosecco (aparte)"] },
                { id: 27, name: "Mojito Clásico", ingredients: ["10 hojas Hierbabuena", "5 cl Sweet & Sour", "5 cl Bacardi Blanco", "Top Casera"] },
                { id: 28, name: "Mojito Frutal", ingredients: ["10 hojas Hierbabuena", "3 cl Sweet & Sour", "5 cl Puré fruta", "5 cl Bacardi Blanco", "Top Casera"] },
                { id: 29, name: "Moscow Mule", ingredients: ["6 cl Vodka", "1/2 Lima cuñas", "2 dashes Angostura", "1 botella Ginger Beer"] },
                { id: 30, name: "Negroni", ingredients: ["2.5 cl Gin Roku", "2.5 cl Campari", "2.5 cl Vermut Yzaguirre rojo"] },
                { id: 31, name: "Pan de Muertos", ingredients: ["5 cl Tequila Patrón", "2.5 cl Triple Seco", "2.5 cl Orgeat", "2.5 cl Lima", "4 cl Zumo piña"] },
                { id: 32, name: "Piña Colada", ingredients: ["20 cl Pre-mix Piña Colada", "5 cl Ron Brugal"] },
                { id: 33, name: "Pisco Sour", ingredients: ["6 cl Pisco Barsol", "3.5 cl Sirope azúcar", "3 cl Lima", "10 gotas Foam"] },
                { id: 34, name: "Sex on the Beach", ingredients: ["5 cl Vodka", "2.5 cl Licor melocotón", "10 cl Zumo arándanos", "10 cl Zumo naranja"] },
                { id: 35, name: "Soho Fino Spritz Rosé", ingredients: ["20 cl SOHO Fino Rosé (Botella 70 cl)"] },
                { id: 36, name: "Tennessee Tea", ingredients: ["5 cl Jack Daniel's", "4.5 cl Triple Seco", "4.5 cl Sweet & Sour", "1 botella Coca-Cola"] },
                { id: 37, name: "Whisky Sour", ingredients: ["6 cl Maker's Mark", "3 cl Limón", "3 cl Sirope simple", "10 gotas Foam"] }
            ],
            noAlcohol: [
                { id: 101, name: "Basilico Vibrante", ingredients: ["6 cl Martini Vibrante", "3 cl Zumo naranja", "3 cl Puré mango", "Top Ginger Ale"] },
                { id: 102, name: "Bellini Spritz", ingredients: ["5 cl Martini Floreale", "2.5 cl Puré melocotón", "2 cl Lima", "Top Ginger Ale"] },
                { id: 103, name: "Little Pink Toy", ingredients: ["12 cl Zumo pomelo rojo", "2.5 cl Lima", "3 cl Sirope Orgeat"] },
                { id: 104, name: "San Francisco", ingredients: ["1 cl Granadina Rives", "20 cl Mezcla zumos (naranja, melocotón, piña)"] },
                { id: 105, name: "Sweet and Spicy", ingredients: ["6 cl Puré ruibarbo", "2 cl Jengibre", "2 cl Sirope Spicy", "2 cl Lima", "1 botella Ginger Beer"] },
                { id: 106, name: "Virgin Caipiroska Frutal", ingredients: ["1/2 Lima cuñas", "3 cuch. Azúcar blanca", "5 cl Puré fruta", "Top Casera"] },
                { id: 107, name: "Virgin Daiquiri Frozen", ingredients: ["5 cl Sweet & Sour", "5 cl Sirope ron (Sin Alc.)", "5 cl Puré fruta elegida"] },
                { id: 108, name: "Virgin Mojito Clásico", ingredients: ["10 hojas Hierbabuena", "3 cl Sweet & Sour", "5 cl Sirope ron (Sin Alc.)", "Top Casera"] },
                { id: 109, name: "Virgin Mojito Italiano", ingredients: ["10 hojas Hierbabuena", "3 cl Sweet & Sour", "5 cl Martini Floreale", "Top Casera"] },
                { id: 110, name: "Virgin Mojito Frutal", ingredients: ["10 hojas Hierbabuena", "3 cl Sweet & Sour", "5 cl Puré fruta", "Top Casera"] },
                { id: 111, name: "Virgin Piña Colada", ingredients: ["20 cl Pre-mix Piña Colada", "12.5 cl Zumo piña adicional"] }
            ],
            guide: {
                premix: [
                    { title: "Pre-mix Piña Colada", body: "35 cl Zumo piña | 20 cl Puré coco | 10 cl Puré piña | 10 cl Sirope ron" },
                    { title: "Sweet & Sour (S&S)", body: "Mezcla base de cítrico y azúcar equilibrada." }
                ],
                units: [
                    { title: "1 cl", body: "10 ml" },
                    { title: "1 dash", body: "1 golpe (aprox. 1 ml / 10 gotas)" },
                    { title: "Foam", body: "Emulsionante o clara para generar espuma." },
                    { title: "Top", body: "Rellenar hasta completar el vaso." }
                ]
            }
        };

        const { useState, useMemo } = React;

        const Icon = ({ name, weight = "bold", className = "" }) => (
            <i className={`ph-${weight} ph-${name} ${className}`} style={{ fontSize: 'inherit' }}></i>
        );

        function App() {
            const [tab, setTab] = useState('alcohol'); 
            const [search, setSearch] = useState('');
            const [selected, setSelected] = useState(null);

            const filteredList = useMemo(() => {
                if (tab === 'guide') return [];
                const target = tab === 'alcohol' ? DATA.alcohol : DATA.noAlcohol;
                if (!search) return target;
                return target.filter(c => c.name.toLowerCase().includes(search.toLowerCase()));
            }, [tab, search]);

            return (
                <div className="flex flex-col min-h-screen">
                    <header className="glass-header sticky top-0 z-40 px-4 pt-6 pb-4">
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="text-xl font-bold tracking-tighter">
                                <span className="text-[#D4AF37]">BARRA</span> POCKET
                            </h1>
                            <div className="px-2 py-0.5 bg-[#D4AF37]/10 rounded text-[10px] text-[#D4AF37] font-bold border border-[#D4AF37]/20">v2.1</div>
                        </div>
                        
                        {tab !== 'guide' && (
                            <div className="relative">
                                <span className="absolute left-3 top-1/2 -translate-y-1/2">
                                    <Icon name="magnifying-glass" className="text-zinc-500" />
                                </span>
                                <input 
                                    type="text" 
                                    placeholder="Buscar cóctel..." 
                                    className="w-full bg-[#1A1A24] border-none rounded-xl py-3 pl-10 pr-4 text-sm text-white focus:ring-1 focus:ring-[#D4AF37] outline-none"
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                />
                            </div>
                        )}
                    </header>

                    <main className="flex-1 px-4 py-4 pb-28">
                        {tab === 'guide' ? (
                            <div className="space-y-6">
                                <section>
                                    <h2 className="text-[#E25822] text-xs font-bold uppercase tracking-widest mb-3 flex items-center gap-2">
                                        <Icon name="book-open" /> Pre-Mixes
                                    </h2>
                                    {DATA.guide.premix.map((item, i) => (
                                        <div key={i} className="bg-[#161620] p-4 rounded-xl border-l-4 border-[#E25822] mb-3">
                                            <h3 className="text-sm font-bold mb-1 text-white">{item.title}</h3>
                                            <p className="text-xs text-zinc-400 leading-relaxed">{item.body}</p>
                                        </div>
                                    ))}
                                </section>
                                <section>
                                    <h2 className="text-[#D4AF37] text-xs font-bold uppercase tracking-widest mb-3 flex items-center gap-2">
                                        <Icon name="info" /> Medidas y Términos
                                    </h2>
                                    <div className="grid grid-cols-2 gap-3">
                                        {DATA.guide.units.map((item, i) => (
                                            <div key={i} className="bg-[#161620] p-3 rounded-xl border border-zinc-800">
                                                <h3 className="text-[#D4AF37] text-xs font-bold uppercase mb-1">{item.title}</h3>
                                                <p className="text-[11px] text-zinc-400">{item.body}</p>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 gap-3">
                                {filteredList.map(cocktail => (
                                    <div 
                                        key={cocktail.id}
                                        onClick={() => setSelected(cocktail)}
                                        className={`cocktail-card p-4 rounded-2xl flex items-center justify-between border-l-4 ${tab === 'alcohol' ? 'border-[#D4AF37]' : 'border-[#00A86B]'}`}
                                    >
                                        <div className="flex items-center gap-4">
                                            <div className="w-11 h-11 bg-[#1A1A24] rounded-xl flex items-center justify-center border border-white/5">
                                                <Icon name="brandy" className={`text-xl ${tab === 'alcohol' ? 'text-[#D4AF37]' : 'text-[#00A86B]'}`} />
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-sm text-white">{cocktail.name}</h3>
                                                <p className="text-[10px] text-zinc-500 uppercase tracking-wide">{cocktail.ingredients.length} ingredientes</p>
                                            </div>
                                        </div>
                                        <Icon name="caret-right" className="text-zinc-700" />
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 glass-header px-6 pt-3 safe-area-bottom z-40">
                        <div className="flex justify-between items-center max-w-md mx-auto">
                            <button onClick={() => {setTab('alcohol'); setSearch('');}} className={`flex flex-col items-center gap-1 pb-3 w-20 transition-colors ${tab === 'alcohol' ? 'text-[#D4AF37]' : 'text-zinc-600'}`}>
                                <Icon name="wine" className="text-2xl" />
                                <span className="text-[10px] font-bold uppercase">Alcohol</span>
                            </button>
                            <button onClick={() => {setTab('no-alcohol'); setSearch('');}} className={`flex flex-col items-center gap-1 pb-3 w-20 transition-colors ${tab === 'no-alcohol' ? 'text-[#00A86B]' : 'text-zinc-600'}`}>
                                <Icon name="drop" className="text-2xl" />
                                <span className="text-[10px] font-bold uppercase">Sin Alc</span>
                            </button>
                            <button onClick={() => setTab('guide')} className={`flex flex-col items-center gap-1 pb-3 w-20 transition-colors ${tab === 'guide' ? 'text-[#E25822]' : 'text-zinc-600'}`}>
                                <Icon name="notebook" className="text-2xl" />
                                <span className="text-[10px] font-bold uppercase">Guía</span>
                            </button>
                        </div>
                    </nav>

                    {selected && (
                        <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/90 backdrop-blur-sm" onClick={() => setSelected(null)}>
                            <div 
                                className="bg-[#161620] w-full max-w-md rounded-t-[32px] border-t border-white/10 p-6 animate-slide-up"
                                onClick={e => e.stopPropagation()}
                            >
                                <div className="w-12 h-1 bg-zinc-800 rounded-full mx-auto mb-6 opacity-50"></div>
                                
                                <div className="flex justify-between items-start mb-6">
                                    <div>
                                        <h2 className="text-2xl font-bold text-white mb-1">{selected.name}</h2>
                                        <span className={`text-[10px] font-bold uppercase px-2 py-0.5 rounded ${tab === 'alcohol' ? 'bg-[#D4AF37]/20 text-[#D4AF37]' : 'bg-[#00A86B]/20 text-[#00A86B]'}`}>
                                            {tab === 'alcohol' ? 'Contiene Alcohol' : 'Sin Alcohol'}
                                        </span>
                                    </div>
                                    <button onClick={() => setSelected(null)} className="bg-white/5 p-2 rounded-full flex items-center justify-center">
                                        <Icon name="x" className="text-xl text-white" />
                                    </button>
                                </div>

                                <div className="space-y-4 mb-8">
                                    <div className="flex items-center gap-2 text-zinc-500 uppercase text-[10px] font-bold tracking-widest">
                                        <Icon name="list-bullets" />
                                        Composición
                                    </div>
                                    <ul className="grid grid-cols-1 gap-2">
                                        {selected.ingredients.map((ing, i) => (
                                            <li key={i} className="flex items-center gap-3 p-3 bg-white/5 rounded-xl text-sm text-zinc-200">
                                                <div className={`w-1.5 h-1.5 rounded-full ${tab === 'alcohol' ? 'bg-[#D4AF37]' : 'bg-[#00A86B]'}`}></div>
                                                {ing}
                                            </li>
                                        ))}
                                    </ul>
                                </div>

                                <button 
                                    onClick={() => setSelected(null)}
                                    className="w-full bg-[#D4AF37] text-black font-bold py-4 rounded-2xl active:scale-95 transition-transform"
                                >
                                    Cerrar Receta
                                </button>
                                <div className="h-4"></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
