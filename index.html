<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barra Pocket - App</title>
    <!-- Estilos y Librerías -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0D0D12;
            color: #F3F3F7;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        .glass-header {
            background: rgba(13, 13, 18, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
        }
        .cocktail-card {
            background: #161620;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cocktail-card:active {
            transform: scale(0.96);
            background: #1c1c2b;
        }
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideUp 0.25s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

  <script type="text/babel">
        const DATA = {
            alcohol: [
                { id: 1, name: "1796 Old Fashioned", image: "img/1796_old_fashined_ilustracion.png", ingredients: ["5 cl Ron Santa Teresa 1796", "2 cl Sirope simple", "1 dash Angostura naranja", "10 gotas Bitter chocolate"] },
                { id: 2, name: "Aperol Spritz", image: "img/aperol_spritz_ilustracion.png", ingredients: ["9 cl Licor Aperol", "12.5 cl Prosecco Follador", "4 cl Soda"] },
                { id: 3, name: "Babilonia", ingredients: ["5 cl Cachaça Iracema", "1.5 cl Sirope pomelo", "1 cl Amaro Ramazzotti", "3 cl Puré maracuyá"] },
                { id: 4, name: "Banana Orange", image: "img/banana_orange_ilustracion.png", ingredients: ["5 cl Licor plátano", "2 cl Puré plátano", "12 cl Zumo naranja", "2.5 cl Vodka Khor"] },
                { id: 5, name: "Bloody Mary", image: "img/bloody_mary_ilustracion.png", ingredients: ["5 cl Vodka Khor", "20 cl Zumo tomate", "1.5 cl Limón", "10 dashes Perrins", "2 Tabasco", "Pimienta y Sal de apio"] },
                { id: 6, name: "Blue Peach Lemonade", image: "img/blue_peach_lemonade_ilustracion.png", ingredients: ["6 cl Licor melocotón", "1.5 cl Blue Curaçao", "2.5 cl Zumo limón", "Top 7up"] },
                { id: 7, name: "Caipirinha", image: "img/caipirinha_ilustracion.png", ingredients: ["6 cl Cachaça", "1/2 Lima cuñas", "4 cuch. Azúcar blanco", "Top Casera"] },
                { id: 8, name: "Caipiroska", image: "img/capiroska_ilustración.png", ingredients: ["6 cl Vodka", "1/2 Lima cuñas", "3 cuch. Azúcar blanco", "Top Casera"] },
                { id: 9, name: "Chandon Garden Spritz", image: "img/chandon_garden_spritz_ilustracion.png", ingredients: ["20 cl Chandon Garden (Botella 70 cl)"] },
                { id: 10, name: "Coco Loco", image: "img/coco_loco_ilustracion.png", ingredients: ["5 cl Licor coco", "2 cl Puré coco", "2.5 cl Triple Seco", "12 cl Zumo piña"] },
                { id: 11, name: "Cosmopolitan", ingredients: ["5 cl Vodka", "2.1 cl Triple Seco", "7 cl Zumo arándanos", "7 cl Zumo lima"] },
                { id: 12, name: "Daiquiri Frozen Frutal", ingredients: ["6 cl Ron Blanco", "3 cl Puré fruta (fresa/mango/pasión)", "2 cl Zumo lima", "2 cl Sirope azúcar", "Hielo picado"] },
                { id: 13, name: "Daiquiri Pineapple", ingredients: ["6 cl Ron Blanco", "3 cl Puré piña", "2 cl Zumo lima", "1.5 cl Sirope azúcar"] },
                { id: 14, name: "Diablo", ingredients: ["5 cl Tequila", "2 cl Licor de cassis", "1.5 cl Zumo lima", "Top Ginger Beer"] },
                { id: 15, name: "Double Apple", ingredients: ["5 cl Licor de manzana", "2 cl Vodka", "10 cl Zumo de manzana", "1 cl Limón"] },
                { id: 16, name: "Electric Lemonade", ingredients: ["5 cl Vodka", "2 cl Blue Curaçao", "3 cl Zumo limón", "Top Sprite/7up"] },
                { id: 17, name: "Hugo Tropical", ingredients: ["10 cl Prosecco", "3 cl Licor de flor de saúco", "2 cl Puré maracuyá", "Top Soda", "Hojas de menta"] },
                { id: 18, name: "La Paloma Patrón", ingredients: ["5 cl Tequila Patrón", "2 cl Zumo lima", "1 cl Sirope de agave", "Top Soda de pomelo rosa", "Borde de sal"] },
                { id: 19, name: "Mai Tai", ingredients: ["4 cl Ron Añejo", "2 cl Ron Blanco", "1.5 cl Triple Seco", "1.5 cl Sirope de almendras (Orgeat)", "1 cl Zumo lima"] },
                { id: 20, name: "Mango Mezcal", ingredients: ["5 cl Mezcal", "4 cl Puré mango", "2 cl Zumo lima", "1 cl Sirope agave", "Toque de tajín"] },
                { id: 21, name: "Margarita Mango Spicy", ingredients: ["5 cl Tequila", "3 cl Puré mango", "2 cl Triple Seco", "2 cl Zumo lima", "Rodaja de jalapeño"] },
                { id: 22, name: "Margarita Tamarindo", ingredients: ["5 cl Tequila", "3 cl Pulpa de tamarindo", "2 cl Triple Seco", "2 cl Zumo lima"] },
                { id: 23, name: "Martini Porn Star", ingredients: ["5 cl Vodka Vainilla", "3 cl Puré maracuyá", "1.5 cl Licor de Passoa", "1 cl Zumo lima", "Chupito de Prosecco aparte"] },
                { id: 24, name: "Mojito Frutal", ingredients: ["5 cl Ron Blanco", "3 cl Puré fruta", "Lima cuñas", "Menta", "Azúcar", "Top Soda"] },
                { id: 25, name: "Pan de Muertos", ingredients: ["5 cl Tequila Reposado", "2 cl Licor de naranja", "2 cl Jarabe de azahar", "3 cl Zumo mandarina"] },
                { id: 26, name: "Pisco Sour", ingredients: ["6 cl Pisco", "3 cl Zumo limón", "2 cl Sirope azúcar", "1 Clara de huevo", "Gotas de Angostura"] },
                { id: 27, name: "Sex on the Beach", ingredients: ["4 cl Vodka", "2 cl Licor de melocotón", "6 cl Zumo naranja", "6 cl Zumo arándanos"] },
                { id: 28, name: "Soho Fino Spritz Rosé", ingredients: ["6 cl Fino", "10 cl Rosé", "Top Soda", "Rodaja de pomelo"] },
                { id: 29, name: "Tennessee Tea", ingredients: ["4 cl Jack Daniel's", "2 cl Triple Seco", "2 cl Zumo limón", "Top Cola"] }
            ],
            noAlcohol: [
                { id: 101, name: "San Francisco", ingredients: ["Zumo naranja", "Zumo limón", "Zumo piña", "Granadina"] },
                { id: 102, name: "Mojito 0.0", ingredients: ["Lima", "Menta", "Azúcar", "Ginger Ale"] },
                { id: 103, name: "Piña Colada 0.0", ingredients: ["9 cl Zumo piña", "3 cl Crema de coco", "1 cl Zumo lima"] },
                { id: 104, name: "Shirley Temple", ingredients: ["Top Ginger Ale", "2 cl Granadina", "Cerezas en almíbar"] },
                { id: 105, name: "Daikiri 0.0", ingredients: ["6 cl Zumo de fruta", "2 cl Zumo lima", "2 cl Sirope azúcar"] },
                { id: 106, name: "Aperol 0.0", ingredients: ["6 cl Sirope Bitter", "10 cl Tónica o Soda", "Rodaja naranja"] }
            ],
            guide: {
                premix: [
                    { title: "Sirope Simple", body: "1 parte agua / 1 parte azúcar" }
                ],
                units: [
                    { title: "cl", body: "Centilitros" },
                    { title: "dash", body: "Golpe o chorrito" }
                ]
            }
        };
        const { useState, useMemo } = React;

        const Icon = ({ name, weight = "bold", className = "" }) => (
            <i className={`ph-${weight} ph-${name} ${className}`} style={{ fontSize: 'inherit' }}></i>
        );

        function App() {
            const [tab, setTab] = useState('alcohol'); 
            const [search, setSearch] = useState('');
            const [selected, setSelected] = useState(null);

            const filteredList = useMemo(() => {
                if (tab === 'guide') return [];
                const target = tab === 'alcohol' ? DATA.alcohol : DATA.noAlcohol;
                if (!search) return target;
                return target.filter(c => c.name.toLowerCase().includes(search.toLowerCase()));
            }, [tab, search]);

            return (
                <div className="flex flex-col min-h-screen">
                    <header className="glass-header sticky top-0 z-40 px-4 pt-6 pb-4">
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="text-xl font-bold tracking-tighter">
                                <span className="text-[#D4AF37]">BARRA</span> POCKET
                            </h1>
                            <div className="px-2 py-0.5 bg-[#D4AF37]/10 rounded text-[10px] text-[#D4AF37] font-bold border border-[#D4AF37]/20">v2.1</div>
                        </div>
                        
                        {tab !== 'guide' && (
                            <div className="relative">
                                <span className="absolute left-3 top-1/2 -translate-y-1/2">
                                    <Icon name="magnifying-glass" className="text-zinc-500" />
                                </span>
                                <input 
                                    type="text" 
                                    placeholder="Buscar cóctel..." 
                                    className="w-full bg-[#1A1A24] border-none rounded-xl py-3 pl-10 pr-4 text-sm text-white focus:ring-1 focus:ring-[#D4AF37] outline-none"
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                />
                            </div>
                        )}
                    </header>

                    <main className="flex-1 px-4 py-4 pb-28">
                        {tab === 'guide' ? (
                            <div className="space-y-6">
                                <section>
                                    <h2 className="text-[#E25822] text-xs font-bold uppercase tracking-widest mb-3 flex items-center gap-2">
                                        <Icon name="book-open" /> Pre-Mixes
                                    </h2>
                                    {DATA.guide.premix.map((item, i) => (
                                        <div key={i} className="bg-[#161620] p-4 rounded-xl border-l-4 border-[#E25822] mb-3">
                                            <h3 className="text-sm font-bold mb-1 text-white">{item.title}</h3>
                                            <p className="text-xs text-zinc-400 leading-relaxed">{item.body}</p>
                                        </div>
                                    ))}
                                </section>
                                <section>
                                    <h2 className="text-[#D4AF37] text-xs font-bold uppercase tracking-widest mb-3 flex items-center gap-2">
                                        <Icon name="info" /> Medidas y Términos
                                    </h2>
                                    <div className="grid grid-cols-2 gap-3">
                                        {DATA.guide.units.map((item, i) => (
                                            <div key={i} className="bg-[#161620] p-3 rounded-xl border border-zinc-800">
                                                <h3 className="text-[#D4AF37] text-xs font-bold uppercase mb-1">{item.title}</h3>
                                                <p className="text-[11px] text-zinc-400">{item.body}</p>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 gap-3">
                                {filteredList.map(cocktail => (
                                    <div 
                                        key={cocktail.id}
                                        onClick={() => setSelected(cocktail)}
                                        className={`cocktail-card p-4 rounded-2xl flex items-center justify-between border-l-4 ${tab === 'alcohol' ? 'border-[#D4AF37]' : 'border-[#00A86B]'}`}
                                    >
                                        <div className="flex items-center gap-4">
                                            <div className="w-11 h-11 bg-[#1A1A24] rounded-xl flex items-center justify-center border border-white/5">
                                                <Icon name="brandy" className={`text-xl ${tab === 'alcohol' ? 'text-[#D4AF37]' : 'text-[#00A86B]'}`} />
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-sm text-white">{cocktail.name}</h3>
                                                <p className="text-[10px] text-zinc-500 uppercase tracking-wide">{cocktail.ingredients.length} ingredientes</p>
                                            </div>
                                        </div>
                                        <Icon name="caret-right" className="text-zinc-700" />
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 glass-header px-6 pt-3 safe-area-bottom z-40">
                        <div className="flex justify-between items-center max-w-md mx-auto">
                            <button onClick={() => {setTab('alcohol'); setSearch('');}} className={`flex flex-col items-center gap-1 pb-3 w-20 transition-colors ${tab === 'alcohol' ? 'text-[#D4AF37]' : 'text-zinc-600'}`}>
                                <Icon name="wine" className="text-2xl" />
                                <span className="text-[10px] font-bold uppercase">Alcohol</span>
                            </button>
                            <button onClick={() => {setTab('no-alcohol'); setSearch('');}} className={`flex flex-col items-center gap-1 pb-3 w-20 transition-colors ${tab === 'no-alcohol' ? 'text-[#00A86B]' : 'text-zinc-600'}`}>
                                <Icon name="drop" className="text-2xl" />
                                <span className="text-[10px] font-bold uppercase">Sin Alc</span>
                            </button>
                            <button onClick={() => setTab('guide')} className={`flex flex-col items-center gap-1 pb-3 w-20 transition-colors ${tab === 'guide' ? 'text-[#E25822]' : 'text-zinc-600'}`}>
                                <Icon name="notebook" className="text-2xl" />
                                <span className="text-[10px] font-bold uppercase">Guía</span>
                            </button>
                        </div>
                    </nav>

                    {selected && (
                        <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/90 backdrop-blur-sm" onClick={() => setSelected(null)}>
                            <div 
                                className="bg-[#161620] w-full max-w-md rounded-t-[32px] border-t border-white/10 p-6 animate-slide-up overflow-y-auto max-h-[90vh]"
                                onClick={e => e.stopPropagation()}
                            >
                                <div className="w-12 h-1 bg-zinc-800 rounded-full mx-auto mb-6 opacity-50"></div>
                                
                                <div className="flex justify-between items-start mb-4">
                                    <div>
                                        <h2 className="text-2xl font-bold text-white mb-1">{selected.name}</h2>
                                        <span className={`text-[10px] font-bold uppercase px-2 py-0.5 rounded ${tab === 'alcohol' ? 'bg-[#D4AF37]/20 text-[#D4AF37]' : 'bg-[#00A86B]/20 text-[#00A86B]'}`}>
                                            {tab === 'alcohol' ? 'Contiene Alcohol' : 'Sin Alcohol'}
                                        </span>
                                    </div>
                                    <button onClick={() => setSelected(null)} className="bg-white/5 p-2 rounded-full flex items-center justify-center">
                                        <Icon name="x" className="text-xl text-white" />
                                    </button>
                                </div>

                                {selected.image && (
                                    <div className="mb-6 rounded-2xl overflow-hidden border border-white/5 bg-[#1A1A24]">
                                        <img 
                                            src={selected.image} 
                                            alt={selected.name} 
                                            className="w-full h-48 object-contain p-4"
                                            onError={(e) => e.target.style.display='none'}
                                        />
                                    </div>
                                )}

                                <div className="space-y-4 mb-8">
                                    <div className="flex items-center gap-2 text-zinc-500 uppercase text-[10px] font-bold tracking-widest">
                                        <Icon name="list-bullets" />
                                        Composición y Decoración
                                    </div>
                                    <ul className="grid grid-cols-1 gap-2">
                                        {selected.ingredients.map((ing, i) => (
                                            <li key={i} className="flex items-center gap-3 p-3 bg-white/5 rounded-xl text-sm text-zinc-200">
                                                <div className={`w-1.5 h-1.5 rounded-full ${tab === 'alcohol' ? 'bg-[#D4AF37]' : 'bg-[#00A86B]'}`}></div>
                                                {ing}
                                            </li>
                                        ))}
                                    </ul>
                                </div>

                                <button 
                                    onClick={() => setSelected(null)}
                                    className="w-full bg-[#D4AF37] text-black font-bold py-4 rounded-2xl active:scale-95 transition-transform"
                                >
                                    Cerrar Receta
                                </button>
                                <div className="h-4"></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
